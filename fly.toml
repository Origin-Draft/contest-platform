app = "contest-platform-api"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "5s"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  PLATFORM_MODE = "production"
  API_HOST = "0.0.0.0"
  API_PORT = "4000"
  LOG_LEVEL = "info"
  AUTH_PROVIDER = "supabase"
  STORAGE_PROVIDER = "supabase"
  DATABASE_SSL = "true"
  UPLOAD_DIR = "/app/uploads"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

# Secrets (set via `fly secrets set`):
#   DATABASE_URL
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   SUPABASE_JWT_SECRET
#   WEB_ORIGIN
#   CORS_ALLOWED_ORIGINS
